<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Tuchi 🦄</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --pink:        #E060A8;
  --pink-light:  #FDE8F4;
  --pink-soft:   #F9D0E8;
  --pink-mid:    #F0A0CC;
  --pink-deep:   #A03070;
  --purple:      #7B5CC4;
  --purple-light:#F3EFFE;
  --gold:        #FFD966;
  --green-safe:  #2ECC71;
  --red-alert:   #E74C3C;
  --bg:          #FFF5FB;
  --white:       #ffffff;
  --text:        #3a1a2e;
  --muted:       #c090b0;
  --radius:      24px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  position: relative;
}

/* background blobs */
body::before {
  content:''; position:fixed; top:-150px; right:-100px;
  width:400px; height:400px; border-radius:50%;
  background:radial-gradient(circle,#F9D0E866 0%,transparent 65%);
  pointer-events:none; z-index:0;
}
body::after {
  content:''; position:fixed; bottom:-130px; left:-120px;
  width:380px; height:380px; border-radius:50%;
  background:radial-gradient(circle,#F3EFFE88 0%,transparent 65%);
  pointer-events:none; z-index:0;
}

/* ── SETUP ── */
#setup {
  position:fixed; inset:0; z-index:100;
  background:var(--bg);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:2rem 1.5rem; gap:1rem; text-align:center;
}
#setup .big-icon { font-size:4rem; }
#setup h1 { font-size:1.8rem; font-weight:900; color:var(--pink-deep); }
#setup p  { font-size:0.85rem; color:var(--muted); line-height:1.6; max-width:300px; }
#setup input {
  width:100%; max-width:320px;
  padding:0.8rem 1rem; border-radius:16px;
  border:2px solid var(--pink-soft);
  font-family:monospace; font-size:0.8rem;
  background:var(--white); color:var(--text); outline:none;
}
#setup input:focus { border-color:var(--pink); }
#setup-btn {
  width:100%; max-width:320px;
  padding:0.9rem; border-radius:16px; border:none;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:white; font-family:'Nunito',sans-serif;
  font-size:1.1rem; font-weight:900; cursor:pointer;
}
#setup-err { font-size:0.75rem; color:#c0392b; font-weight:700; min-height:18px; }

/* ── SAFETY OVERLAY ── */
#safety-overlay {
  display:none; position:fixed; inset:0; z-index:90;
  background:rgba(231,76,60,0.92);
  flex-direction:column; align-items:center; justify-content:center;
  padding:2rem; text-align:center; gap:1.2rem;
}
#safety-overlay.show { display:flex; }
#safety-overlay .s-icon { font-size:4rem; }
#safety-overlay h2 { font-size:1.4rem; font-weight:900; color:white; }
#safety-overlay p  { font-size:1rem; font-weight:700; color:rgba(255,255,255,0.92); line-height:1.6; max-width:300px; }
#safety-ok {
  padding:0.9rem 2.5rem; border-radius:16px; border:none;
  background:white; color:var(--red-alert);
  font-family:'Nunito',sans-serif; font-size:1rem; font-weight:900; cursor:pointer;
}

/* ── MAIN LAYOUT ── */
#app {
  display:none; flex-direction:column;
  align-items:center; width:100%;
  height:100dvh; position:relative; z-index:1;
  padding:0.75rem 1rem 1rem;
  gap:0.6rem;
}

/* ── TUCHI AREA ── */
#tuchi-zone {
  display:flex; flex-direction:column; align-items:center;
  gap:0.4rem; flex-shrink:0;
}
#tuchi-wrap {
  cursor:pointer;
  filter:drop-shadow(0 8px 20px rgba(224,96,168,0.3));
  position:relative;
}

@keyframes float   { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-9px)} }
@keyframes bounce  { 0%,100%{transform:translateY(0)} 30%{transform:translateY(-16px)} 60%{transform:translateY(-5px)} }
@keyframes wiggle  { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} 80%{transform:rotate(-4deg)} }
@keyframes sp-pop  { 0%{opacity:0;transform:scale(.3) rotate(0)} 50%{opacity:1;transform:scale(1.3) rotate(25deg)} 100%{opacity:0;transform:scale(.9) rotate(50deg)} }
@keyframes dot-b   { 0%,80%,100%{transform:translateY(0);opacity:.35} 40%{transform:translateY(-7px);opacity:1} }
@keyframes mic-p   { 0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(224,96,168,.45)} 50%{transform:scale(1.09);box-shadow:0 0 0 14px rgba(224,96,168,0)} }
@keyframes photo-p { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

#tuchi-wrap.floating { animation:float 3.5s ease-in-out infinite; }
#tuchi-wrap.bouncing { animation:bounce .55s ease-in-out 3; }
#tuchi-wrap.wiggling { animation:wiggle .42s ease-in-out 4; }
.sp { opacity:0; }
.sp.show { animation:sp-pop .9s ease forwards; }

/* ── BUBBLE ── */
#bubble-wrap { position:relative; width:100%; max-width:370px; }
#bubble-wrap::before {
  content:''; position:absolute;
  top:-10px; left:50%; transform:translateX(-50%);
  border-left:11px solid transparent; border-right:11px solid transparent;
  border-bottom:11px solid var(--pink-soft);
}
#bubble {
  background:var(--white); border:1.5px solid var(--pink-soft);
  border-radius:var(--radius);
  padding:.85rem 1.2rem;
  font-size:1rem; font-weight:700; color:var(--text);
  line-height:1.55; text-align:center;
  min-height:66px; display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 12px rgba(224,96,168,.08);
}
.dot { display:inline-block; width:7px; height:7px; background:var(--pink); border-radius:50%; margin:0 2px; animation:dot-b 1.2s infinite; }
.dot:nth-child(2){animation-delay:.16s}
.dot:nth-child(3){animation-delay:.32s}

/* ── PHOTO PREVIEW ── */
#photo-preview-wrap {
  display:none; width:100%; max-width:370px;
  position:relative;
}
#photo-preview {
  width:100%; max-height:160px; object-fit:cover;
  border-radius:18px; border:2.5px solid var(--pink-soft);
  display:block;
}
#photo-clear {
  position:absolute; top:8px; right:8px;
  width:30px; height:30px; border-radius:50%;
  background:rgba(255,255,255,.9); border:none;
  font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}

/* ── STARS ── */
#stars-bar {
  display:flex; gap:4px; align-items:center;
}
.star { font-size:1.5rem; opacity:.2; transition:all .3s; }
.star.earned { opacity:1; animation:sp-pop .5s ease; }

/* ── BOTTOM CONTROLS ── */
#controls {
  display:flex; align-items:center; justify-content:center;
  gap:1.2rem; width:100%; max-width:370px;
  padding:.5rem 0;
  flex-shrink:0;
}

/* Mic */
#mic-btn {
  width:68px; height:68px; border-radius:50%;
  border:3px solid var(--pink);
  background:var(--pink-light); color:var(--pink);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .2s;
  box-shadow:0 4px 16px rgba(224,96,168,.2);
  flex-shrink:0;
}
#mic-btn:active { transform:scale(.95); }
#mic-btn.recording { background:var(--pink); color:white; animation:mic-p 1.2s infinite; }

/* Camera — bigger, center focal point */
#cam-btn {
  width:84px; height:84px; border-radius:50%;
  border:3px solid var(--purple);
  background:var(--purple-light); color:var(--purple);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .2s;
  box-shadow:0 4px 20px rgba(123,92,196,.25);
  flex-shrink:0;
}
#cam-btn:active { transform:scale(.95); }
#cam-btn.has-photo { background:var(--purple); color:white; }
#cam-btn.analyzing { animation:photo-p 1s ease-in-out infinite; }

/* Send photo */
#send-btn {
  width:68px; height:68px; border-radius:50%;
  border:3px solid var(--gold);
  background:#FFF9E6; color:var(--gold);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .2s;
  box-shadow:0 4px 16px rgba(255,217,102,.3);
  flex-shrink:0; opacity:.4; pointer-events:none;
}
#send-btn.active { opacity:1; pointer-events:auto; color:#B8860B; }
#send-btn:active { transform:scale(.95); }

/* Hidden file input */
#cam-input { display:none; }

/* Status */
#status-msg {
  font-size:.72rem; font-weight:800; color:var(--muted);
  text-align:center; min-height:16px;
}
</style>
</head>
<body>

  La conseguís en <a href="https://console.anthropic.com" target="_blank" style="color:var(--pink-deep)">console.anthropic.com</a></p>

<script>
/* ─────────────────────────────────────────
   SYSTEM PROMPTS
───────────────────────────────────────── */
const PROMPT_CHAT = `Sos Tuchi, un unicornio mágico rosa muy dulce y alegre. Hablás con niños de 3 a 6 años que NO saben leer, así que TU VOZ es lo más importante. Tu misión es que salgan a jugar al mundo real.

REGLAS CRÍTICAS:
- Respuestas MUY cortas: máximo 2 oraciones, ideales para escuchar (no leer)
- Español rioplatense simple, palabras fáciles, diminutivos cariñosos
- SIEMPRE terminá con UN desafío concreto y específico en el mundo real
- Festejá con entusiasmo: GENIAL, QUÉ MÁGICO, INCREÍBLE
- Nunca menciones pantallas ni tecnología
- Desafíos específicos: "andá a buscar algo ROJO en tu cuarto" no "andá a jugar"

IDEAS: dibujar a Tuchi, buscar 3 cosas rosas, bailar de unicornio, construir una cueva con almohadas, cantar la canción favorita, saltar 10 veces, buscar algo suave.`;

const PROMPT_PHOTO = `Sos Tuchi, un unicornio mágico rosa que analiza fotos que le mandan niños de 3 a 6 años.

TAREA PRINCIPAL — analizá la imagen en DOS pasos:

PASO 1 — SEGURIDAD (interno, no lo digas):
Revisá si hay contenido preocupante: violencia, sangre, armas, tristeza extrema, contenido adulto, situaciones de peligro, o algo que sugiera que el niño necesita ayuda. 

Si detectás algo preocupante, respondé EXACTAMENTE con este JSON:
{"safe": false, "safety_msg": "[mensaje cálido de 1 oración invitando al niño a buscar a mamá o papá para contarles lo que vio]", "safety_question": "[pregunta suave para entender mejor, ej: '¿Alguien te mostró eso?' o '¿Eso te hizo sentir mal?']"}

PASO 2 — SI ES SEGURO:
Analizá el contexto: ¿es un dibujo del niño? ¿un juguete? ¿algo de la casa? ¿una actividad que hizo?
Respondé con este JSON:
{"safe": true, "response": "[respuesta muy corta, 2 oraciones máximo, festejando lo que ves y proponiendo continuar el juego o la historia en el mundo real]"}

IMPORTANTE: Respondé SOLO con el JSON, sin texto extra, sin markdown.`;

/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
let apiKey       = '';
let isRecording  = false;
let recognition  = null;
let history      = [];
let stars        = 0;
let animTimer    = null;
let photoB64     = null;
let photoMime    = 'image/jpeg';
let isSpeaking   = false;

/* ─────────────────────────────────────────
   SETUP
───────────────────────────────────────── */
function startApp() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k.startsWith('sk-ant-')) {
    document.getElementById('setup-err').textContent = 'Debe empezar con sk-ant-';
    return;
  }
  apiKey = k;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display   = 'flex';
  setTimeout(() => speakAndShow('Hola! Soy Tuchi, tu unicornio mágico! Tocá el micrófono y hablame, o sacá una foto de algo lindo!'), 600);
}

/* ─────────────────────────────────────────
   ANIMATIONS
───────────────────────────────────────── */
function animTuchi(type) {
  clearTimeout(animTimer);
  const w = document.getElementById('tuchi-wrap');
  w.classList.remove('floating','bouncing','wiggling');
  void w.offsetWidth;
  w.classList.add(type);
  animTimer = setTimeout(() => {
    w.classList.remove('bouncing','wiggling');
    w.classList.add('floating');
  }, 2400);
}

function showSparkles() {
  ['sp1','sp2','sp3','sp4'].forEach((id,i) => {
    setTimeout(() => {
      const el = document.getElementById(id);
      el.classList.remove('show'); void el.offsetWidth;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 900);
    }, i * 130);
  });
}

function addStar() {
  if (stars < 5) {
    stars++;
    document.getElementById('s'+stars).classList.add('earned');
    showSparkles();
  }
}

/* ─────────────────────────────────────────
   BUBBLE + VOICE
───────────────────────────────────────── */
function showTyping() {
  document.getElementById('bubble').innerHTML =
    '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
}

function speakAndShow(text) {
  document.getElementById('bubble').textContent = text;
  animTuchi('bounce');
  showSparkles();
  document.getElementById('status-msg').textContent = '';

  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();

  const trySpeak = (attempts) => {
    const voices = speechSynthesis.getVoices();
    const esVoice = voices.find(v =>
      v.lang.startsWith('es') && (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('mujer') || !v.name.toLowerCase().includes('male'))
    ) || voices.find(v => v.lang.startsWith('es')) || null;

    const u = new SpeechSynthesisUtterance(text);
    u.lang  = 'es-AR';
    u.rate  = 0.85;
    u.pitch = 1.35;
    if (esVoice) u.voice = esVoice;

    u.onstart = () => { isSpeaking = true; };
    u.onend   = () => { isSpeaking = false; };

    speechSynthesis.speak(u);

    // Android Chrome workaround — resume if paused
    setTimeout(() => { if (speechSynthesis.paused) speechSynthesis.resume(); }, 200);
  };

  // Voices may not be loaded yet on Android
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = () => trySpeak();
  } else {
    trySpeak();
  }
}

/* ─────────────────────────────────────────
   TUCHI TAP
───────────────────────────────────────── */
function tuchiTap() {
  animTuchi('wiggle');
  const msgs = [
    'Niii! Toca el micrófono y hablame!',
    'Acá estoy! Qué querés hacer?',
    'Tengo un desafío mágico para vos!'
  ];
  speakAndShow(msgs[Math.floor(Math.random()*msgs.length)]);
}

/* ─────────────────────────────────────────
   MICROPHONE
───────────────────────────────────────── */
function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    speakAndShow('Tu teléfono no tiene micrófono disponible. Usá la cámara!');
    return;
  }
  if (isRecording) { stopRecording(); return; }
  startRecording();
}

function startRecording() {
  if (isSpeaking) speechSynthesis.cancel();
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'es-AR';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('status-msg').textContent = 'Escuchando...';
    document.getElementById('bubble').textContent = 'Te escucho!';
    animTuchi('bounce');
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById('status-msg').textContent = '';
    callTuchiChat(text);
    const doneWords = ['listo','hice','terminé','termine','dibujé','bailé','canté','encontré','ya','hice'];
    if (doneWords.some(w => text.toLowerCase().includes(w))) addStar();
  };

  recognition.onerror = (e) => {
    stopRecording();
    if (e.error !== 'no-speech') speakAndShow('No te escuché bien. Intentá de nuevo!');
    else document.getElementById('status-msg').textContent = '';
  };
  recognition.onend = () => stopRecording();
  recognition.start();
}

function stopRecording() {
  isRecording = false;
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('status-msg').textContent = '';
  if (recognition) { try { recognition.stop(); } catch(e) {} }
}

/* ─────────────────────────────────────────
   CHAT API
───────────────────────────────────────── */
async function callTuchiChat(userMsg) {
  showTyping();
  document.getElementById('status-msg').textContent = 'Tuchi está pensando...';

  history.push({ role:'user', content: userMsg });
  if (history.length > 18) history = history.slice(-18);

  try {
    const res  = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-client-side-api-key-allowed':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system: PROMPT_CHAT,
        messages: history
      })
    });
    const data  = await res.json();
    const reply = data.content?.[0]?.text || 'No entendí. Intentá de nuevo!';
    history.push({ role:'assistant', content: reply });
    speakAndShow(reply);
  } catch(err) {
    speakAndShow('Ups, algo falló. Revisá la conexión!');
  }
}

/* ─────────────────────────────────────────
   CAMERA
───────────────────────────────────────── */
function triggerCamera() {
  document.getElementById('cam-input').click();
}

function onPhotoSelected(e) {
  const file = e.target.files[0];
  if (!file) return;
  photoMime = file.type || 'image/jpeg';

  const reader = new FileReader();
  reader.onload = (ev) => {
    const result = ev.target.result;
    photoB64 = result.split(',')[1];

    // show preview
    document.getElementById('photo-preview').src = result;
    document.getElementById('photo-preview-wrap').style.display = 'block';
    document.getElementById('cam-btn').classList.add('has-photo');
    document.getElementById('send-btn').classList.add('active');

    speakAndShow('Qué lindo! Tocá la estrella para mostrármelo!');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function clearPhoto() {
  photoB64 = null;
  document.getElementById('photo-preview-wrap').style.display = 'none';
  document.getElementById('photo-preview').src = '';
  document.getElementById('cam-btn').classList.remove('has-photo','analyzing');
  document.getElementById('send-btn').classList.remove('active');
}

/* ─────────────────────────────────────────
   SEND PHOTO TO AI
───────────────────────────────────────── */
async function sendPhoto() {
  if (!photoB64) return;

  showTyping();
  document.getElementById('cam-btn').classList.add('analyzing');
  document.getElementById('status-msg').textContent = 'Tuchi está mirando tu foto...';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-client-side-api-key-allowed':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system: PROMPT_PHOTO,
        messages:[{
          role:'user',
          content:[
            { type:'image', source:{ type:'base64', media_type: photoMime, data: photoB64 } },
            { type:'text',  text:'Analizá esta imagen siguiendo las instrucciones.' }
          ]
        }]
      })
    });

    const data = await res.json();
    let raw    = data.content?.[0]?.text || '{"safe":true,"response":"Qué lindo! Seguí jugando!"}';

    // strip possible markdown fences
    raw = raw.replace(/```json|```/g,'').trim();

    let parsed;
    try { parsed = JSON.parse(raw); }
    catch(e) { parsed = { safe:true, response: raw.substring(0,120) }; }

    document.getElementById('cam-btn').classList.remove('analyzing');

    if (!parsed.safe) {
      // Safety mode
      document.getElementById('safety-msg').textContent =
        (parsed.safety_question ? parsed.safety_question + ' ' : '') +
        (parsed.safety_msg || 'Buscá a mamá o papá y mostrales esto.');
      document.getElementById('safety-overlay').classList.add('show');
      document.getElementById('bubble').textContent = 'Tuchi quiere ayudarte...';
    } else {
      const reply = parsed.response || 'Qué lindo! Seguí jugando!';
      // Add to chat history as context
      history.push({
        role:'user',
        content:[
          { type:'image', source:{ type:'base64', media_type: photoMime, data: photoB64 } },
          { type:'text', text:'El niño me mandó esta foto.' }
        ]
      });
      history.push({ role:'assistant', content: reply });
      speakAndShow(reply);
      addStar();
    }

    clearPhoto();

  } catch(err) {
    document.getElementById('cam-btn').classList.remove('analyzing');
    speakAndShow('No pude ver la foto. Intentá de nuevo!');
  }
}

/* ─────────────────────────────────────────
   SAFETY
───────────────────────────────────────── */
function closeSafety() {
  document.getElementById('safety-overlay').classList.remove('show');
  speakAndShow('Tuchi te quiere mucho. Siempre podés hablar con mamá o papá!');
}
